<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathewelt – Wasser & Kästchenmodell</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --u: #8b5cf6;
      --u-light: #f3e8ff;
      --u-dark: #6b21a8;
      --m: #0ea5e9;
      --m-light: #e0f2fe;
      --m-dark: #0369a1;
      --ok: #16a34a;
      --warn: #ea580c;
      --danger: #ef4444;
      --water: linear-gradient(180deg, #7dd3fc 0%, #38bdf8 45%, #0284c7 100%);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      padding: 24px;
      background: #111827;
      color: white;
    }

    header h1 { margin: 0 0 8px 0; font-size: 2rem; }
    header p { margin: 0; color: #d1d5db; max-width: 950px; }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .controls, .results, .team-card, .transfer-buffer, .student-input-section, .grid-tool-card {
      background: var(--card);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
      margin-bottom: 24px;
    }

    .transfer-buffer {
      background: #f9fafb;
      border: 2px dashed var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .transfer-buffer.active-u { background: var(--u-light); border-color: var(--u); }
    .transfer-buffer.active-m { background: var(--m-light); border-color: var(--m); }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: #111827;
      color: white;
      transition: all 0.2s ease;
    }

    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { opacity: 0.25; cursor: not-allowed; transform: none !important; }
    button.secondary { background: #4b5563; }
    button.accent { background: var(--ok); }
    button.warning { background: var(--warn); }

    .teams-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .full-width-grid { grid-column: 1 / -1; }

    @media (max-width: 1024px) {
      .teams-grid { grid-template-columns: 1fr; }
      .full-width-grid { grid-column: auto; }
    }

    .team-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #f3f4f6;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .cup-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      align-items: flex-end;
    }

    .cup-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 110px;
    }

    .cup-shell {
      position: relative;
      width: 70px;
      height: 140px;
      border: 3px solid #64748b;
      border-top: none;
      border-bottom-left-radius: 14px;
      border-bottom-right-radius: 14px;
      background: rgba(255, 255, 255, 0.6);
      overflow: hidden;
    }

    .water-fill {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      background: var(--water);
      transition: height 0.3s ease-in-out;
    }

    .cup-avg-line {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 2px dashed var(--danger);
      z-index: 10;
    }

    .action-btns {
      display: flex;
      gap: 4px;
      width: 100%;
    }
    .action-btns button {
      flex: 1;
      padding: 6px 2px;
      font-size: 0.8rem;
      border-radius: 6px;
    }

    /* KÄSTCHEN MODELL STYLES */
    .grid-canvas {
      display: flex;
      gap: 30px;
      justify-content: center;
      align-items: flex-end;
      background: #fafafa;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--line);
      margin-top: 15px;
    }

    .grid-column {
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
    }

      height: 20px;
